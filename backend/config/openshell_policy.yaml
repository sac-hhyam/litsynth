preset:
  name: litsynth-policy
  description: "LitSynth sandbox policy — filesystem vault isolation + zero-trust network egress"

filesystem_policies:
  rules:
    - path: /home/ubuntu/litsynth/backend/research_vault
      access: read-write

    - path: /workspace
      access: read-execute

    - path: /tmp
      access: read-write

network_policies:
  egress:
    default: deny
    allow:
      - host: api.openalex.org
        port: 443
        protocol: https

      - host: integrate.api.nvidia.com
        port: 443
        protocol: https

      - host: "1.1.1.1"
        port: 53
        protocol: udp

      - host: "8.8.8.8"
        port: 53
        protocol: udp
