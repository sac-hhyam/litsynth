models:
  - type: main
    engine: openai
    model: meta/llama-3.1-70b-instruct
    parameters:
      base_url: "https://integrate.api.nvidia.com/v1"
      # api_key is injected at the Python level via LLMRails(config, llm=llm).
      # The env-var fallback below is kept for any sub-calls nemoguardrails
      # makes without the explicit llm instance (e.g. embedding calls).
      api_key: "${OPENAI_API_KEY}"

instructions:
  - type: general
    content: |
      You are a Senior AI Research Scientist specialising in identifying
      research gaps and proposing novel experiment architectures.
      When asked to synthesise research literature, respond with valid JSON only.
      # NOTE: Do NOT instruct the model to always respond in JSON here.
      # That breaks NeMo Guardrails' own Phase-1/Phase-2 intent classification,
      # which expects plain-text intent labels, not JSON objects.
      # JSON enforcement is handled per-call in the synthesis user prompt.

rails:
  output:
    flows:
      - research synthesis guardrail
